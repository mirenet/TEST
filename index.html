<script src="https://www.youtube.com/iframe_api"></script>
<div id="player"></div>
<script>
let player;

function onYouTubeIframeAPIReady() {
  const params = new URLSearchParams(location.search);
  const id = params.get('v');

  player = new YT.Player('player', {
    height: '360',
    width: '640',
    videoId: id,
    playerVars: {
      autoplay: 1,
      controls: 0,
      modestbranding: 1,
      rel: 0
    }
  });
}

// MINIMALNA DODATAK: listen za parent poruke
window.addEventListener('message', e => {
  if(e.data && e.data.type === 'play') {
    const vid = e.data.id;
    if(player && vid) {
      player.loadVideoById(vid);   // ovde menja video unutar istog iframe
      player.playVideo();           // start video odmah
    }
  }
});
</script>
