<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Circle Zoom Test</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

.circle{
width:300px;
height:300px;
border-radius:50%;
overflow:hidden;
position:relative;
margin-top:50px;
background:#000;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

.circle iframe{
width:640px;
height:360px;
border:0;
position:absolute;
top:50%;
left:50%;
transform-origin:center;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:transparent;
cursor:pointer;
}

.controls{
margin-top:30px;
width:90%;
max-width:400px;
text-align:center;
}

.controls input[type="range"]{
width:100%;
}

.playlist{
margin-top:30px;
width:95%;
max-width:500px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.video-btn{
padding:8px;
background:#222;
border:1px solid #444;
font-size:12px;
text-align:center;
cursor:pointer;
}

.video-btn:active{
background:#333;
}

</style>
</head>

<body>

<h3>YouTube Circle Zoom Test</h3>

<div class="circle">

<iframe
id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

<div id="overlay" class="overlay"></div>

</div>

<div class="controls">

<p>Zoom</p>

<input
type="range"
id="zoomSlider"
min="0.5"
max="2"
step="0.05"
value="1">

</div>

<div class="playlist" id="playlist"></div>

<script>

const player=document.getElementById("player")
const overlay=document.getElementById("overlay")
const slider=document.getElementById("zoomSlider")

let zoom=1
let posX=0
let posY=0

let clickTimer=null
let lastEvent=null

let skipPos=null



function updateTransform(){

player.style.transform=
`translate(-50%,-50%) translate(${posX}px,${posY}px) scale(${zoom})`

}



slider.oninput=()=>{

zoom=parseFloat(slider.value)

updateTransform()

}



overlay.addEventListener("click",(e)=>{

if(clickTimer){

// DOUBLE CLICK

clearTimeout(clickTimer)
clickTimer=null

if(skipPos){

posX=skipPos.x
posY=skipPos.y
zoom=2

updateTransform()

}

}else{

lastEvent=e

clickTimer=setTimeout(()=>{

// SINGLE CLICK → prosledi videu

overlay.style.pointerEvents="none"

const el=document.elementFromPoint(
lastEvent.clientX,
lastEvent.clientY
)

if(el) el.click()



// zapamti skip poziciju prvi put

const rect=overlay.getBoundingClientRect()

skipPos={
x:lastEvent.clientX-rect.left-150,
y:lastEvent.clientY-rect.top-150
}



overlay.style.pointerEvents="auto"

clickTimer=null

},250)

}

})



// playlist

const videos=[
"dQw4w9WgXcQ",
"9bZkp7q19f0",
"3JZ_D3ELwOQ",
"kJQP7kiw5Fk",
"RgKAFK5djSk",
"OPf0YbXqDm0",
"JGwWNGJdvx8",
"60ItHLz5WEA",
"CevxZvSJLk8",
"fRh_vgS2dFE",
"lp-EO5I60KA",
"KQ6zr6kCPj8",
"pRpeEdMmmQ0",
"hT_nvWreIhg",
"YQHsXMglC9A"
]

const playlist=document.getElementById("playlist")

videos.forEach(id=>{

const btn=document.createElement("div")

btn.className="video-btn"
btn.innerText=id

btn.onclick=()=>{
player.src="https://www.youtube.com/embed/"+id
}

playlist.appendChild(btn)

})

updateTransform()

</script>

</body>
</html>
