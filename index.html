<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Loader</title>
  <style>
    html,body{height:100%;margin:0}
    #app{height:100%;display:flex;flex-direction:column}
    #toolbar{padding:8px;background:#111;color:#fff;font-family:sans-serif}
    #frame{flex:1;border:0;width:100%}
    #message{padding:12px;font-family:sans-serif}
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <strong>Local Loader</strong>
      <span style="margin-left:12px;font-size:0.9em">Fragment length: <span id="len">0</span></span>
    </div>

    <div id="message">Učitavam iz fragmenta...</div>

    <!-- sandbox iframe: promenite sandbox atribut ako želite da omogućite npr. lokalne skripte -->
    <iframe id="frame" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>

<script>
(function(){
  const message = document.getElementById('message');
  const frame = document.getElementById('frame');
  const lenSpan = document.getElementById('len');

  // Uzima raw hash bez vodećeg '#'
  let raw = location.hash ? location.hash.slice(1) : '';

  // Ako hash počinje sa "b64," tretiramo kao base64; ako ne, tretiramo kao percent-encoded
  function decodePayload(s){
    if(!s) return '';
    try{
      if(s.startsWith('b64,')){
        // ukloni prefix i dekodiraj base64 (globalno bez URI-problema)
        return atob(s.slice(4));
      } else {
        // percent-dekodiranje (encodeURIComponent sa lokala)
        return decodeURIComponent(s);
      }
    }catch(e){
      console.error('Decode failed', e);
      return '';
    }
  }

  lenSpan.textContent = raw.length;

  if(!raw){
    message.textContent = 'Nema koda u fragmentu. Pokrenite lokalni fajl koji preusmerava na ovaj URL sa #kod-ovde';
    return;
  }

  // Dekodiraj
  const html = decodePayload(raw);

  if(!html){
    message.textContent = 'Neuspelo dekodiranje fragmenta ili prazan sadržaj.';
    return;
  }

  // Učitaj u sandbox iframe preko srcdoc (izbegava direktno innerHTML na roditelju)
  try{
    frame.srcdoc = html;
    message.style.display = 'none';
  }catch(e){
    // fallback: data URI ako browser ne podržava srcdoc
    frame.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
    message.style.display = 'none';
  }

})();
</script>
</body>
</html>
