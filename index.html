<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Circle Player with JSON Playlist</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Krug */
 .circle{
  width:300px;
  height:300px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  margin-top:50px;
  background:#000;
  box-shadow:0 0 25px rgba(0,0,0,.6);
} 

/* Video */
.circle iframe{
  width:640px;
  height:360px;
  border:0;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  transform-origin:center;
}







.circle.hovered {
  overflow: visible;
}
.circle.hovered iframe {
  transform: translate(-50%,-50%) scale(1);
}






  

/* Kontrole */
.controls{
  margin-top:30px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.controls input[type="range"]{
  width:100%;
}

.controls input[type="number"]{
  width:80px;
  margin-top:10px;
  font-size:16px;
}

/* Dugmad */
.buttons{
  margin-top:15px;
}

.buttons button{
  padding:6px 12px;
  margin:3px;
  background:#222;
  color:white;
  border:1px solid #444;
  cursor:pointer;
}

/* Playlist */
.playlist{
  margin-top:30px;
  width:95%;
  max-width:500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.video-btn{
  padding:8px;
  background:#222;
  border:1px solid #444;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.video-btn:active{
  background:#333;
}
</style>
</head>
<body>

<h3>YouTube Circle Player</h3>

<div class="circle">
  <div id="player"></div>
</div>

<div class="controls">
  <p>Zoom video</p>
  <input type="range" id="zoomSlider" min="0.3" max="1.5" step="0.05" value="1">
  <br><br>
  <input type="number" id="zoomInput" step="0.05" value="1">
  <div class="buttons">
    <button onclick="playRandom()">Play Random</button>
    <button onclick="nextVideo()">Next</button>
  </div>
</div>

<div class="playlist" id="playlist"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

// Extract YouTube IDs
const videos = playlistData.map(v => {
  const url = v.youtubeUrl;
  return url.includes("v=") ? url.split("v=")[1] : url;
});

// YouTube Player
let player;
let currentIndex = 0;

function getId(url){
  return url.includes("v=") ? url.split("v=")[1] : url;
}

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player',{
   /* height:'360',
    width:'640',*/
    height: '360',
    width: '360',
    videoId: videos[currentIndex],
    events:{ 'onStateChange': onPlayerStateChange }
  });
}

function onPlayerStateChange(e){
  if(e.data === YT.PlayerState.ENDED){
    nextVideo();
  }
}

// Play Random
function playRandom(){
  currentIndex = Math.floor(Math.random()*videos.length);
  player.loadVideoById(videos[currentIndex]);
}

// Next Video
function nextVideo(){
  currentIndex = (currentIndex + 1) % videos.length;
  player.loadVideoById(videos[currentIndex]);
}

// Zoom
const slider = document.getElementById("zoomSlider");
const input = document.getElementById("zoomInput");

function setZoom(v){
  if(player && player.getIframe){
    const iframe = player.getIframe();
    iframe.style.transform = "translate(-50%,-50%) scale(" + v + ")";
  }
  slider.value = v;
  input.value = v;
}

slider.oninput = ()=> setZoom(slider.value);
input.oninput = ()=> setZoom(input.value);

// Playlist UI
const playlistEl = document.getElementById("playlist");

playlistData.forEach((item, i)=>{
  const btn = document.createElement("div");
  btn.className = "video-btn";
  btn.innerText = item.artist + " - " + item.track;
  btn.onclick = ()=>{
    currentIndex = i;
    player.loadVideoById(videos[i]);
  };
  playlistEl.appendChild(btn);
});







const circle = document.querySelector('.circle');

circle.addEventListener('mouseenter', ()=>{
  circle.classList.add('hovered');
});

circle.addEventListener('mouseleave', ()=>{
  circle.classList.remove('hovered');
});
