<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Skip Button Overlay Test</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}
h3{margin-top:20px;}

.circle{
  width:300px;
  height:300px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  margin-top:50px;
  background:#000;
  box-shadow:0 0 25px rgba(0,0,0,.6);
  touch-action: manipulation;
}

/* video */
.circle iframe{
  width:640px;
  height:360px;
  border:0;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.15);
  transform-origin:center;
  transition: transform 0.3s ease;
}

/* overlay */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:100;
  background:transparent;
  touch-action: none;
}

/* skip marker */
#skipMarker{
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  position:absolute;
  display:none;
  z-index:200;
  touch-action: none;
}

/* controls */
.controls{
  margin-top:30px;
  width:90%;
  max-width:400px;
  text-align:center;
}
.controls input[type="range"]{
  width:100%;
}
.controls input[type="number"]{
  width:80px;
  margin-top:10px;
  font-size:16px;
}

/* playlist */
.playlist{
  margin-top:30px;
  width:95%;
  max-width:500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.video-btn{
  padding:8px;
  background:#222;
  border:1px solid #444;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}
.video-btn:active{
  background:#333;
}

/* long press menu */
#menu{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:#222;
  border:1px solid #555;
  padding:10px;
  display:none;
  flex-direction:column;
  gap:8px;
  z-index:300;
}
.menu-btn{
  background:#333;
  padding:8px;
  cursor:pointer;
  text-align:center;
}
.menu-btn:active{
  background:#444;
}
</style>
</head>
<body>

<h3>YouTube Skip Button Overlay Test</h3>

<div class="circle" id="circle">
  <iframe id="player" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allowfullscreen></iframe>
  <div id="overlay"></div>
  <div id="skipMarker"></div>
</div>

<div class="controls">
<p>Video Zoom</p>
<input type="range" id="zoomSlider" min="0.3" max="1.5" step="0.05" value="1.15">
<br><br>
<input type="number" id="zoomInput" step="0.05" value="1.15">
</div>

<div class="playlist" id="playlist"></div>

<!-- Long press menu -->
<div id="menu">
  <div class="menu-btn" id="menuZoom">Video Zoom</div>
  <div class="menu-btn" id="menuSkip">Skip Button</div>
  <div class="menu-btn" id="menuClose">Close</div>
</div>

<script>
// ---- lista videa ----
const videos = [
  "dQw4w9WgXcQ", "9bZkp7q19f0", "3JZ_D3ELwOQ", "kJQP7kiw5Fk",
  "RgKAFK5djSk", "OPf0YbXqDm0", "JGwWNGJdvx8", "60ItHLz5WEA",
  "CevxZvSJLk8", "fRh_vgS2dFE", "lp-EO5I60KA", "KQ6zr6kCPj8",
  "pRpeEdMmmQ0", "hT_nvWreIhg", "YQHsXMglC9A"
];
const player = document.getElementById("player");
const playlist = document.getElementById("playlist");
const slider = document.getElementById("zoomSlider");
const input = document.getElementById("zoomInput");
const overlay = document.getElementById("overlay");
const circle = document.getElementById("circle");
const menu = document.getElementById("menu");
const skipMarker = document.getElementById("skipMarker");

let skipPos = {x:150, y:150}; // centar po default
let editMode = null;
let videoNormalScale = 1.15;
let skipScale = 0.4;
let lastTap = 0;

// ---- Playlist ----
videos.forEach(id => {
  const btn = document.createElement("div");
  btn.className = "video-btn";
  btn.innerText = id;
  btn.onclick = () => { player.src = "https://www.youtube.com/embed/" + id + "?enablejsapi=1"; };
  playlist.appendChild(btn);
});

// ---- Video Zoom ----
function setZoom(v) {
  videoNormalScale = parseFloat(v);
  player.style.transform = `translate(-50%,-50%) scale(${videoNormalScale})`;
  slider.value = v;
  input.value = v;
}

slider.oninput = () => { setZoom(slider.value); };
input.oninput = () => { setZoom(input.value); };

// ---- Long press menu ----
let pressTimer = null;
overlay.addEventListener("touchstart", e => {
  pressTimer = setTimeout(() => {
    // pauziraj video
    player.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
    menu.style.display = "flex";
  }, 500);
});

overlay.addEventListener("touchend", e => {
  clearTimeout(pressTimer);
});

// ---- Menu buttons ----
document.getElementById("menuZoom").onclick = () => {
  editMode = 'zoom';
  skipMarker.style.display = 'none';
  menu.style.display = 'none';
};

document.getElementById("menuSkip").onclick = () => {
  editMode = 'skip';
  skipMarker.style.display = 'block';
  skipMarker.style.left = skipPos.x - 10 + "px";
  skipMarker.style.top = skipPos.y - 10 + "px";
  menu.style.display = 'none';
};

document.getElementById("menuClose").onclick = () => {
  editMode = null;
  skipMarker.style.display = 'none';
  menu.style.display = 'none';
};

// ---- Drag skip marker ----
let dragOffset = {x: 0, y: 0};
skipMarker.addEventListener("touchstart", e => {
  dragOffset.x = e.touches[0].clientX - skipMarker.offsetLeft;
  dragOffset.y = e.touches[0].clientY - skipMarker.offsetTop;
});
skipMarker.addEventListener("touchmove", e => {
  if (editMode !== 'skip') return;
  let x = e.touches[0].clientX - dragOffset.x;
  let y = e.touches[0].clientY - dragOffset.y;
  // ograničenje unutar kruga
  const rect = circle.getBoundingClientRect();
  x = Math.max(rect.left, Math.min(rect.right - 20, x));
  y = Math.max(rect.top, Math.min(rect.bottom - 20, y));
  skipMarker.style.left = x + "px";
  skipMarker.style.top = y + "px";
});
skipMarker.addEventListener("touchend", e => {
  const rect = circle.getBoundingClientRect();
  skipPos.x = skipMarker.offsetLeft - rect.left + 10;
  skipPos.y = skipMarker.offsetTop - rect.top + 10;
});

// ---- Tap / Double tap ----
overlay.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTap < 300) {
    // dupli tap
    const rect = circle.getBoundingClientRect();
    let dx = rect.width / 2 - skipPos.x;
    let dy = rect.height / 2 - skipPos.y;
    if (player.style.transform.includes(skipScale)) {
      // vrati na normal zoom
      player.style.transform = `translate(-50%,-50%) scale(${videoNormalScale})`;
    } else {
      // zumiraj skip dugme
      player.style.transform = `translate(${dx}px, ${dy}px) scale(${skipScale})`;
    }
  } else {
    // jedan klik - normalno video
    player.style.transform = `translate(-50%,-50%) scale(${videoNormalScale})`;
  }
  lastTap = now;
});
</script>

</body>
</html>
