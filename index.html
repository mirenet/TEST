<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Circle Player with Popout</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h3{
  margin-top:20px;
}

/* krug */
.circle{
  width:300px;
  height:300px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  margin-top:50px;
  background:#000;
  box-shadow:0 0 25px rgba(0,0,0,.6);
}

/* video */
.circle iframe{
  width:640px;
  height:360px;
  border:0;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  transform-origin:center;
  transition: transform 0.3s ease;
  cursor:pointer;
}

/* overlay dugme na videu */
.popout-btn{
  position:absolute;
  bottom:10px;
  right:10px;
  z-index:10;
  padding:6px 10px;
  background:#222;
  border:1px solid #555;
  color:white;
  cursor:pointer;
  font-size:14px;
  border-radius:4px;
}

/* kontrola zoom */
.controls{
  margin-top:30px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.controls input[type="range"]{
  width:100%;
}

/* playlist */
.playlist{
  margin-top:30px;
  width:95%;
  max-width:500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.video-btn{
  padding:8px;
  background:#222;
  border:1px solid #444;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.video-btn:active{
  background:#333;
}
</style>
</head>
<body>

<h3>YouTube Circle Player</h3>

<div class="circle">
  <iframe id="player" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
  <button class="popout-btn" id="popoutBtn">⤢</button>
</div>

<div class="controls">
  <p>Zoom video</p>
  <input type="range" id="zoomSlider" min="0.3" max="1.5" step="0.05" value="1">
</div>

<div class="playlist" id="playlist"></div>

<script>
const videos = [
  "dQw4w9WgXcQ",
  "9bZkp7q19f0",
  "3JZ_D3ELwOQ",
  "kJQP7kiw5Fk",
  "RgKAFK5djSk",
  "OPf0YbXqDm0",
  "JGwWNGJdvx8",
  "60ItHLz5WEA",
  "CevxZvSJLk8",
  "fRh_vgS2dFE",
  "lp-EO5I60KA",
  "KQ6zr6kCPj8",
  "pRpeEdMmmQ0",
  "hT_nvWreIhg",
  "YQHsXMglC9A"
];

const player = document.getElementById("player");
const slider = document.getElementById("zoomSlider");
const popoutBtn = document.getElementById("popoutBtn");
let popout = false;
let normalScale = 1;
let popoutScale = 1.8; // koliko da se "iskoci"

function setZoom(scale){
  player.style.transform = `translate(-50%, -50%) scale(${scale})`;
  slider.value = scale;
}

// slider kontrola zoom
slider.oninput = () => {
  if(!popout) normalScale = slider.value;
  setZoom(popout ? popoutScale : normalScale);
};

// dugme za popout
popoutBtn.onclick = (e) => {
  e.stopPropagation(); // da klik ne ide na body
  popout = !popout;
  setZoom(popout ? popoutScale : normalScale);
};

// klik van videa vraca nazad u krug
document.body.onclick = (e) => {
  if(popout){
    // proveri da li je klik unutar circle
    const circle = document.querySelector('.circle');
    if(!circle.contains(e.target)){
      popout = false;
      setZoom(normalScale);
    }
  }
};

// playlist
const playlistDiv = document.getElementById("playlist");
videos.forEach(id => {
  const btn = document.createElement("div");
  btn.className = "video-btn";
  btn.innerText = id;
  btn.onclick = () => {
    player.src = "https://www.youtube.com/embed/" + id;
  };
  playlistDiv.appendChild(btn);
});

</script>
</body>
</html>
