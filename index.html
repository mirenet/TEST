<!DOCTYPE html>
<html>
<body>

<iframe id="ytplayer"
width="640"
height="390"
frameborder="0"
allowfullscreen>
</iframe>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("v");

document.getElementById("ytplayer").src =
"https://www.youtube.com/embed/" + id;
</script>

</body>
</html>
