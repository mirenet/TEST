<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Circle Player Pop-Out Button</title>
<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h3 {
  margin-top:20px;
}

/* krug */
.circle {
  width:300px;
  height:300px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  margin-top:40px;
  background:#000;
  box-shadow:0 0 25px rgba(0,0,0,.6);
}

/* video */
.circle iframe {
  width:640px;
  height:360px;
  border:0;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  transform-origin:center;
  transition: all 0.3s ease;
}

/* pop-out dugme */
.popout-btn {
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(255,255,255,0.2);
  color:white;
  border:none;
  padding:4px 8px;
  cursor:pointer;
  font-size:18px;
  z-index:10;
}

/* kontrole */
.controls {
  margin-top:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.controls input[type="range"] {
  width:100%;
}

/* playlist */
.playlist {
  margin-top:20px;
  width:95%;
  max-width:500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.video-btn {
  padding:8px;
  background:#222;
  border:1px solid #444;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.video-btn:active {
  background:#333;
}
</style>
</head>
<body>

<h3>YouTube Circle Player Pop-Out</h3>

<div class="circle" id="circle">
  <iframe id="player" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
  <button class="popout-btn" id="popoutBtn">→</button>
</div>

<div class="controls">
  <p>Zoom video</p>
  <input type="range" id="zoomSlider" min="0.3" max="1.5" step="0.05" value="1">
</div>

<div class="playlist" id="playlist"></div>

<script>
// lista videa
const videos = [
"dQw4w9WgXcQ",
"9bZkp7q19f0",
"3JZ_D3ELwOQ",
"kJQP7kiw5Fk",
"RgKAFK5djSk",
"OPf0YbXqDm0",
"JGwWNGJdvx8",
"60ItHLz5WEA",
"CevxZvSJLk8",
"fRh_vgS2dFE",
"lp-EO5I60KA",
"KQ6zr6kCPj8",
"pRpeEdMmmQ0",
"hT_nvWreIhg",
"YQHsXMglC9A"
];

const player = document.getElementById("player");
const slider = document.getElementById("zoomSlider");
const circle = document.getElementById("circle");
const popoutBtn = document.getElementById("popoutBtn");

function setZoom(v){
  player.style.transform = "translate(-50%,-50%) scale("+v+")";
  slider.value = v;
}

slider.oninput = ()=>{
  setZoom(slider.value);
};

// playlist dugmići
const playlist = document.getElementById("playlist");
videos.forEach(id=>{
  const btn = document.createElement("div");
  btn.className = "video-btn";
  btn.innerText = id;
  btn.onclick = ()=>{
    player.src = "https://www.youtube.com/embed/"+id+"?autoplay=1";
  };
  playlist.appendChild(btn);
});

// pop-out logika
let poppedOut = false;

popoutBtn.addEventListener("click", (e)=>{
  e.stopPropagation(); // ne propagira klik do kruga
  if(!poppedOut){
    player.style.width = "90vw";
    player.style.height = "calc(90vw * 9 / 16)";
    circle.style.overflow = "visible";
    poppedOut = true;
  }
});

// klik van videa vraca u krug
document.body.addEventListener("click", (e)=>{
  if(poppedOut){
    // proveri da li klik nije unutar videa
    if(!circle.contains(e.target)){
      player.style.width = "640px";
      player.style.height = "360px";
      circle.style.overflow = "hidden";
      poppedOut = false;
    }
  }
});
</script>

</body>
</html>
