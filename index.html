<div style="position: relative; width: 560px; height: 315px;">
    <!-- Dugme koje korisnik vidi -->
    <button id="fake-button"
            style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:1;">
        Klikni da pokreneš video
    </button>

    <!-- YouTube iframe 1x1 px iznad dugmeta -->
    <iframe id="youtube-player"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1&autoplay=0"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            style="position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; z-index: 2; opacity:0;">
    </iframe>
</div>

<script>
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        events: {
            'onReady': function() {
                // Klik na dugme zapravo pogađa iframe
                const button = document.getElementById('fake-button');
                button.addEventListener('click', () => {
                    // player.playVideo(); // opcionalno, autoplay ce raditi jer je klik registrovan
                    button.style.display = 'none'; // dugme nestaje
                });
            }
        }
    });
}
</script>
