<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Autoplay Test</title>
</head>
<body>

<div id="video-container" style="position: relative; width: 560px; height: 315px;">
    <!-- YouTube iframe potpuno sakriven -->
    <iframe id="youtube-player" 
            width="560" 
            height="315"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1&autoplay=0" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen
            style="position:absolute; top:0; left:0; z-index:1; opacity:0; pointer-events:none;">
    </iframe>

    <!-- Dugme preko plejera -->
    <button id="play-button" 
            style="position:absolute; top:0; left:0; width:560px; height:315px; z-index:2;">
        Klikni da pokreneš video
    </button>
</div>

<script>
// Učitaj YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        events: {
            'onReady': onPlayerReady
        }
    });
}

function onPlayerReady(event) {
    const button = document.getElementById('play-button');
    button.addEventListener('click', () => {
        player.playVideo();             // autoplay kao rezultat user gesture
        button.style.display = 'none';  // ukloni dugme
        document.getElementById('youtube-player').style.opacity = 1; // video postaje vidljiv
        document.getElementById('youtube-player').style.pointerEvents = 'auto';
    });
}
</script>

</body>
</html>
