<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YouTube Circle Zoom — fixed calibration</title>
<style>
  body{margin:0;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  h3{margin:6px 0 14px;}
  .circle{width:300px;height:300px;border-radius:50%;overflow:hidden;position:relative;background:#000;box-shadow:0 0 25px rgba(0,0,0,.6);}
  iframe#player{width:640px;height:360px;border:0;position:absolute;top:50%;left:50%;transform-origin:center;will-change:transform;transition:transform 260ms cubic-bezier(.2,.9,.2,1);}
  .overlay{position:absolute;inset:0;background:transparent;cursor:pointer;display:block;}
  .marker{position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(255,0,0,0.95);transform:translate(-50%,-50%);pointer-events:none;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,.7);display:none;}
  .controls{margin-top:18px;width:95%;max-width:520px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .controls input[type="range"]{width:180px;}
  .btn{background:#222;border:1px solid #444;color:#fff;padding:8px 10px;border-radius:6px;cursor:pointer;}
  .btn.active{background:#0a84ff;}
  .note{opacity:.9;font-size:13px;}
</style>
</head>
<body>

<h3>YouTube Circle Zoom — calibrated jump (fixed)</h3>

<div class="circle" id="circle">
  <iframe id="player" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allowfullscreen></iframe>
  <div id="overlay" class="overlay" aria-hidden="true"></div>
  <div id="marker" class="marker"></div>
</div>

<div class="controls">
  <label class="note">Zoom:</label>
  <input id="zoomRange" type="range" min="0.6" max="2.4" step="0.05" value="1">
  <button id="calibrateBtn" class="btn">Calibrate skip</button>
  <button id="gotoBtn" class="btn">Go to saved</button>
  <div id="status" class="note">Single click = play/pause · Double click = jump to saved</div>
</div>

<script>
/* Fixed calibrated jump:
   - saving uses iframeRect center and divides by current zoom to get pre-scale coords (saved.px, saved.py)
   - jumping uses posX = -saved.px * targetZoom, posY = -saved.py * targetZoom
*/

let player, playerReady = false;
const iframe = document.getElementById('player');
const overlay = document.getElementById('overlay');
const marker = document.getElementById('marker');
const circle = document.getElementById('circle');

const zoomRange = document.getElementById('zoomRange');
const calibrateBtn = document.getElementById('calibrateBtn');
const gotoBtn = document.getElementById('gotoBtn');
const status = document.getElementById('status');

let zoom = parseFloat(zoomRange.value);
let posX = 0, posY = 0;

let clickTimer = null;
let lastEvent = null;
let calibrating = false;
let saved = null; // { px, py } in iframe-local (pre-scale) coordinates relative to iframe center

/* --- YouTube IFrame API init --- */
function onYouTubeIframeAPIReady(){
  player = new YT.Player('player', {
    events: { 'onReady': () => { playerReady = true; } },
    playerVars: { 'playsinline': 1 }
  });
}
(function loadYT(){
  const s = document.createElement('script');
  s.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(s);
})();

/* --- apply transform to iframe --- */
function applyTransform(){
  iframe.style.transform = `translate(-50%,-50%) translate(${posX}px,${posY}px) scale(${zoom})`;
  // update marker position visually
  updateMarkerVisual();
}

/* --- update marker location on screen based on saved (after current transform) --- */
function updateMarkerVisual(){
  if(!saved){ marker.style.display = 'none'; return; }
  const circleRect = circle.getBoundingClientRect();
  const cx = circleRect.left + circleRect.width / 2;
  const cy = circleRect.top  + circleRect.height / 2;

  // after transform, saved point's offset from circle center = zoom * saved.px + posX
  const screenOffsetX = zoom * saved.px + posX;
  const screenOffsetY = zoom * saved.py + posY;

  const markerX = cx + screenOffsetX;
  const markerY = cy + screenOffsetY;

  marker.style.left = (markerX - circleRect.left) + 'px';
  marker.style.top  = (markerY - circleRect.top) + 'px';
  marker.style.display = 'block';
}

/* --- zoom control --- */
zoomRange.addEventListener('input', (e) => {
  zoom = parseFloat(e.target.value);
  applyTransform();
});

/* --- calibrate button --- */
calibrateBtn.addEventListener('click', () => {
  calibrating = !calibrating;
  calibrateBtn.classList.toggle('active', calibrating);
  calibrateBtn.textContent = calibrating ? 'Click on video to save' : 'Calibrate skip';
  status.textContent = calibrating ? 'Click overlay where Skip button is visible.' : 'Single click = play/pause · Double click = jump to saved';
});

/* --- goto button --- */
gotoBtn.addEventListener('click', () => {
  if(!saved){ alert('Nema sačuvane pozicije. Prvo pritisni Calibrate pa klikni na skip dugme.'); return; }
  jumpToSaved();
});

/* --- calibration: compute saved.px/saved.py in pre-scale iframe coords --- */
function calibrateAtEvent(e){
  const iframeRect = iframe.getBoundingClientRect();
  const fx = iframeRect.left + iframeRect.width / 2;
  const fy = iframeRect.top  + iframeRect.height / 2;

  // px_screen je udaljenost od iframe centra u screen (CSS) pikselima *posle* trenutnog transform-a
  const px_screen = e.clientX - fx;
  const py_screen = e.clientY - fy;

  // da bismo dobili pre-scale vrednost, podelimo sa trenutnim zoom-om
  const px = px_screen / zoom;
  const py = py_screen / zoom;

  saved = { px: Math.round(px), py: Math.round(py) };

  calibrating = false;
  calibrateBtn.classList.remove('active');
  calibrateBtn.textContent = 'Calibrate skip';
  status.textContent = 'Saved skip position';
  updateMarkerVisual();
  setTimeout(()=> status.textContent = 'Single click = play/pause · Double click = jump to saved', 1200);
}

/* --- jump: compute posX,posY for target zoom so saved point comes to center --- */
function jumpToSaved(targetZoom){
  if(!saved) return;
  const tgt = (typeof targetZoom === 'number') ? targetZoom : Math.max(1.2, Math.min(2.4, parseFloat(zoomRange.value) || 1.8));
  // pos = -saved.preScale * targetZoom
  posX = -saved.px * tgt;
  posY = -saved.py * tgt;
  zoom = tgt;
  zoomRange.value = zoom;
  applyTransform();
  status.textContent = 'Jumped to saved position';
  setTimeout(()=> status.textContent = 'Single click = play/pause · Double click = jump to saved', 1200);
}

/* --- overlay click logic: single vs double --- */
overlay.addEventListener('click', (e) => {
  if(calibrating){
    // calibration click
    calibrateAtEvent(e);
    return;
  }

  // double click detection
  if(clickTimer){
    // double click
    clearTimeout(clickTimer);
    clickTimer = null;
    if(saved){
      jumpToSaved();
    } else {
      status.textContent = 'No saved position — press Calibrate and click on skip button to save.';
      setTimeout(()=> status.textContent = 'Single click = play/pause · Double click = jump to saved', 1400);
    }
    return;
  }

  // single click (if no second click within 260ms)
  lastEvent = e;
  clickTimer = setTimeout(() => {
    clickTimer = null;
    // toggle play/pause via YT API (trusted gesture)
    if(playerReady && player && typeof player.getPlayerState === 'function'){
      const st = player.getPlayerState();
      if(st === 1){ player.pauseVideo(); } else { player.playVideo(); }
    } else {
      // fallback: just focus iframe
      iframe.focus();
    }
  }, 260);
});

/* --- reposition marker when layout changes --- */
window.addEventListener('resize', updateMarkerVisual);
window.addEventListener('scroll', updateMarkerVisual);

/* --- init --- */
applyTransform();

</script>
</body>
</html>
