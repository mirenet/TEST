<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Smart Local HTML Loader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    #container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
    }

    h2 {
        margin-bottom: 25px;
        font-size: 22px;
        font-weight: 500;
        line-height: 1.4;
    }

    #pickBtn {
        appearance: none;
        background: #2b2b2b;
        color: #fff;
        padding: 14px 28px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        width: 100%;
        cursor: pointer;
        box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        transition: background 0.2s, transform 0.2s;
    }

    #pickBtn:active {
        transform: scale(0.97);
        background: #3a3a3a;
    }
</style>
</head>

<body>

<div id="container"></div>

<script>
// ===============================
// DB – koristimo IndexedDB
// ===============================
function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open("localHTMLdb", 1);
        req.onupgradeneeded = () => {
            req.result.createObjectStore("htmlStore");
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = e => reject(e);
    });
}

async function saveHTML(text) {
    const db = await openDB();
    const tx = db.transaction("htmlStore", "readwrite");
    tx.objectStore("htmlStore").put(text, "lastHTML");
    return tx.complete;
}

async function loadHTML() {
    const db = await openDB();
    return new Promise(resolve => {
        const tx = db.transaction("htmlStore", "readonly");
        const req = tx.objectStore("htmlStore").get("lastHTML");
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
    });
}


// ===============================
// UČITAJ HTML U STRANICU
// ===============================
function runHTML(html){
    document.open();
    document.write(html);
    document.close();
}


// ===============================
// START LOADERA
// ===============================
(async function() {

    // 1) Pokusaj auto-load
    const previous = await loadHTML();

    if (previous) {
        runHTML(previous);
        return;
    }

    // 2) Ako nema fajla – prikazi UI
    showPickerUI();

})();


// ===============================
// UI ZA PRVI INSTALL
// ===============================
function showPickerUI() {
    document.getElementById("container").innerHTML = `
        <h2>Install your app…</h2>
        <button id="pickBtn">Install</button>
    `;

    document.getElementById("pickBtn").onclick = async () => {

        const [handle] = await window.showOpenFilePicker({
            types: [{ description: "HTML Files", accept: {"text/html": [".html"]} }]
        });

        const file = await handle.getFile();
        const text = await file.text();

        await saveHTML(text);  // sacuvaj u IndexedDB

        runHTML(text); // pokreni app
    };
}
</script>

</body>
</html>
