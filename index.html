<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Circle Zoom Test</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

.circle{
width:300px;
height:300px;
border-radius:50%;
overflow:hidden;
position:relative;
margin-top:50px;
background:#000;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

.circle iframe{
width:640px;
height:360px;
border:0;
position:absolute;
top:50%;
left:50%;
transform-origin:center;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:transparent;
cursor:pointer;
}

.controls{
margin-top:30px;
width:90%;
max-width:400px;
text-align:center;
}

.controls input[type="range"]{
width:100%;
}

.controls input{
margin-top:10px;
font-size:16px;
}

.playlist{
margin-top:30px;
width:95%;
max-width:500px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.video-btn{
padding:8px;
background:#222;
border:1px solid #444;
font-size:12px;
text-align:center;
cursor:pointer;
}

.video-btn:active{
background:#333;
}

</style>
</head>

<body>

<h3>YouTube Circle Zoom Test</h3>

<div class="circle">

<iframe
id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

<div id="overlay" class="overlay"></div>

</div>

<div class="controls">

<p>Zoom video</p>

<input
type="range"
id="zoomSlider"
min="0.3"
max="2"
step="0.05"
value="1">

<br>

<input
type="number"
id="zoomInput"
step="0.05"
value="1">

<br><br>

<p>Skip button position</p>

X:
<input type="number" id="skipX" value="150">

Y:
<input type="number" id="skipY" value="150">

</div>

<div class="playlist" id="playlist"></div>

<script>

const player=document.getElementById("player")
const overlay=document.getElementById("overlay")

const slider=document.getElementById("zoomSlider")
const input=document.getElementById("zoomInput")

const skipX=document.getElementById("skipX")
const skipY=document.getElementById("skipY")

let zoom=1
let posX=0
let posY=0

let tapTime=0
let tapCount=0

function updateTransform(){

player.style.transform=
`translate(-50%,-50%) translate(${posX}px,${posY}px) scale(${zoom})`

}

function setZoom(v){

zoom=parseFloat(v)

slider.value=zoom
input.value=zoom

updateTransform()

}

slider.oninput=()=>setZoom(slider.value)
input.oninput=()=>setZoom(input.value)



overlay.addEventListener("click",()=>{

const now=Date.now()

if(now-tapTime<300){

tapCount++

}else{

tapCount=1

}

tapTime=now



if(tapCount===2){

// double tap -> zoom skip dugme

posX=parseInt(skipX.value)||0
posY=parseInt(skipY.value)||0

zoom=2

updateTransform()

}



if(tapCount===3){

// triple tap -> reset

posX=0
posY=0
zoom=1

updateTransform()

tapCount=0

}



// pusti klik videu

overlay.style.pointerEvents="none"

setTimeout(()=>{

overlay.style.pointerEvents="auto"

},350)

})



// playlist

const videos=[
"dQw4w9WgXcQ",
"9bZkp7q19f0",
"3JZ_D3ELwOQ",
"kJQP7kiw5Fk",
"RgKAFK5djSk",
"OPf0YbXqDm0",
"JGwWNGJdvx8",
"60ItHLz5WEA",
"CevxZvSJLk8",
"fRh_vgS2dFE",
"lp-EO5I60KA",
"KQ6zr6kCPj8",
"pRpeEdMmmQ0",
"hT_nvWreIhg",
"YQHsXMglC9A"
]

const playlist=document.getElementById("playlist")

videos.forEach(id=>{

const btn=document.createElement("div")

btn.className="video-btn"
btn.innerText=id

btn.onclick=()=>{
player.src="https://www.youtube.com/embed/"+id
}

playlist.appendChild(btn)

})

updateTransform()

</script>

</body>
</html>
