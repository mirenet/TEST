<script>

const player = document.getElementById("player");
const overlay = document.getElementById("overlay");

const slider = document.getElementById("zoomSlider");
const input = document.getElementById("zoomInput");

const skipX = document.getElementById("skipX");
const skipY = document.getElementById("skipY");

let zoom = 1;
let posX = 0;
let posY = 0;

let skipPos = { x:150, y:150 };

let tapCount = 0;
let tapTimer = null;

function updateTransform() {

  player.style.transform =
  `translate(-50%,-50%) translate(${posX}px, ${posY}px) scale(${zoom})`;

}

function setZoom(v){

  zoom = parseFloat(v);

  slider.value = zoom;
  input.value = zoom;

  updateTransform();

}

slider.oninput = () => setZoom(slider.value);
input.oninput = () => setZoom(input.value);


skipX.oninput = () => {
  skipPos.x = parseInt(skipX.value,10) || 0;
}

skipY.oninput = () => {
  skipPos.y = parseInt(skipY.value,10) || 0;
}



function handleTap(){

  tapCount++;

  if(tapCount === 1){

    tapTimer = setTimeout(()=>{

      // SINGLE TAP
      overlay.style.display="none";

      setTimeout(()=>{
        overlay.style.display="block";
      },1000);

      tapCount = 0;

    },300);

  }

  if(tapCount === 2){

    clearTimeout(tapTimer);

    // DOUBLE TAP (zoom skip)
    posX = skipPos.x;
    posY = skipPos.y;

    zoom = 1.8;

    updateTransform();

    tapCount = 0;

  }

  if(tapCount === 3){

    clearTimeout(tapTimer);

    // TRIPLE TAP (reset)
    posX = 0;
    posY = 0;
    zoom = 1;

    updateTransform();

    tapCount = 0;

  }

}


// mouse
overlay.addEventListener("click",handleTap);

// touch
overlay.addEventListener("touchstart",(e)=>{
  e.preventDefault();
  handleTap();
});

</script>
