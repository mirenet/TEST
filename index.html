<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Circle Zoom Test</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

.circle{
width:300px;
height:300px;
border-radius:50%;
overflow:hidden;
position:relative;
margin-top:50px;
background:#000;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

.circle iframe{
width:640px;
height:360px;
border:0;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
transform-origin:center;
will-change:transform;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
cursor:pointer;
}

.controls{
margin-top:30px;
width:90%;
max-width:400px;
text-align:center;
}

.controls input[type="range"]{
width:100%;
}

.controls input{
margin-top:10px;
font-size:16px;
}

</style>
</head>

<body>

<h3>YouTube Circle Zoom Test</h3>

<div class="circle">

<iframe
id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1"
allowfullscreen>
</iframe>

<div id="overlay" class="overlay"></div>

</div>

<div class="controls">

<p>Zoom video</p>

<input type="range" id="zoomSlider" min="0.5" max="2.5" step="0.05" value="1">

<br>

<input type="number" id="zoomInput" step="0.05" value="1">

<br><br>

<p>Skip Button Position (X,Y)</p>

<input type="number" id="skipX" value="150">
<input type="number" id="skipY" value="150">

</div>

<script>

const player = document.getElementById("player")
const overlay = document.getElementById("overlay")

const slider = document.getElementById("zoomSlider")
const input = document.getElementById("zoomInput")

const skipX = document.getElementById("skipX")
const skipY = document.getElementById("skipY")

let zoom = 1
let posX = 0
let posY = 0

let skipPos = {x:150,y:150}

let tapCount = 0
let tapTimer = null



function updateTransform(){

player.style.transform =
`translate(-50%,-50%) translate(${posX}px,${posY}px) scale(${zoom})`

}



function setZoom(v){

zoom = parseFloat(v)

slider.value = zoom
input.value = zoom

updateTransform()

}



slider.oninput = ()=>setZoom(slider.value)
input.oninput = ()=>setZoom(input.value)



skipX.oninput = ()=>{

skipPos.x = parseInt(skipX.value) || 0

}

skipY.oninput = ()=>{

skipPos.y = parseInt(skipY.value) || 0

}



function handleTap(){

tapCount++



if(tapCount===1){

tapTimer=setTimeout(()=>{

// SINGLE TAP

overlay.style.display="none"

setTimeout(()=>{

overlay.style.display="block"

},1000)

tapCount=0

},300)

}



else if(tapCount===2){

clearTimeout(tapTimer)

// DOUBLE TAP

posX=skipPos.x
posY=skipPos.y
zoom=2

updateTransform()

tapCount=0

}



else if(tapCount===3){

clearTimeout(tapTimer)

// TRIPLE TAP RESET

posX=0
posY=0
zoom=1

updateTransform()

tapCount=0

}

}



overlay.addEventListener("click",handleTap)

overlay.addEventListener("touchstart",(e)=>{

e.preventDefault()

handleTap()

})

</script>

</body>
</html>
