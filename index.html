<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube WebView Click Trick</title>
<style>
#container {
    position: relative;
    width: 150px;
    height: 150px;
}
#fake-button {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    font-size: 20px;
    cursor: pointer;
}
#youtube-player {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;       /* minimalna veličina za registraciju klika */
    height: 100%;
    z-index: 2;
    opacity: 0.30;
    transform: translate(-50%, -50%); 
}
</style>
</head>
<body>

<div id="container">
    <!-- Dugme koje korisnik vidi -->
    <button id="fake-button">Klikni da pokreneš video</button>

    <!-- YouTube iframe 1x1 px iznad dugmeta -->
    <iframe id="youtube-player"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1&autoplay=0"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>
</div>

<script>
// Učitaj YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        events: {
            'onReady': function() {
                const button = document.getElementById('fake-button');
                button.addEventListener('click', () => {
                    // Klik korisnika pada na iframe → autoplay radi
                    player.playVideo(); // opcionalno, možeš direktno pokrenuti video
                    button.style.display = 'none'; // uklanja dugme
                });
            }
        }
    });
}
</script>

</body>
</html>
