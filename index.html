<!DOCTYPE html>
<html>
<body>
<script src="https://www.youtube.com/iframe_api"></script>
<div id="player"></div>

<script>
let player;

function isValidVideoId(id) {
  return /^[a-zA-Z0-9_-]{11}$/.test(id);
}

function onYouTubeIframeAPIReady() {
  const params = new URLSearchParams(location.search);
  const id = params.get("v");

  if (!isValidVideoId(id)) return;

  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: id,
    playerVars: {
      autoplay: 1,
      controls: 0,
      showinfo: 0,
      modestbranding: 1
    }
  });
}

 // Listen for parent message
window.addEventListener('message', e => {
  if(e.data && e.data.type === 'play') {
    const vid = e.data.id;
    if(player && vid) {
      player.loadVideoById(vid);   // ovde menja video unutar istog iframe
      player.playVideo();           // start video odmah
    }
  }
}); 
</script>
</body>
</html>
