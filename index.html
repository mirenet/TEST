<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Circle Zoom Test</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* krug */
    .circle {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      margin-top: 50px;
      background: #000;
      box-shadow: 0 0 25px rgba(0, 0, 0, .6);
    }

    /* video */
    .circle iframe {
      width: 640px;
      height: 360px;
      border: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center;
    }

    /* kontrole */
    .controls {
      margin-top: 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .controls input[type="range"] {
      width: 100%;
    }

    .controls input[type="number"] {
      width: 80px;
      margin-top: 10px;
      font-size: 16px;
    }

    .controls input[type="text"] {
      width: 80px;
      margin-top: 10px;
      font-size: 16px;
    }

    /* overlay za klikove */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      cursor: pointer;
      display: block;
    }

  </style>
</head>

<body>

<h3>YouTube Circle Zoom Test</h3>

<div class="circle" id="circle">
  <iframe id="player"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1"
          allowfullscreen>
  </iframe>

  <!-- Overlay za detekciju klika -->
  <div id="overlay" class="overlay"></div>
</div>

<div class="controls">

  <p>Zoom video</p>

  <input type="range" id="zoomSlider" min="0.3" max="1.5" step="0.05" value="1">

  <br><br>

  <input type="number" id="zoomInput" step="0.05" value="1">

  <br><br>

  <p>Skip Button Position (X, Y)</p>
  <input type="text" id="skipX" placeholder="X" value="150">
  <input type="text" id="skipY" placeholder="Y" value="150">

</div>

<script>

  const player = document.getElementById("player");
  const slider = document.getElementById("zoomSlider");
  const input = document.getElementById("zoomInput");
  const skipX = document.getElementById("skipX");
  const skipY = document.getElementById("skipY");
  const overlay = document.getElementById("overlay");
  const circle = document.getElementById("circle");

  let skipPos = { x: 150, y: 150 }; // Default position for skip button
  let videoNormalScale = 1;
  let zoomed = false;

  let lastTap = 0; // For double tap detection
  let singleTapTimeout;

  // Video Zoom function
  function setZoom(v) {
    videoNormalScale = parseFloat(v);
    player.style.transform = "translate(-50%,-50%) scale(" + videoNormalScale + ")";
    slider.value = v;
    input.value = v;
  }

  slider.oninput = () => {
    setZoom(slider.value);
  }

  input.oninput = () => {
    setZoom(input.value);
  }

  // Set the skip position manually (pomoću X i Y koordinata)
  skipX.oninput = () => {
    skipPos.x = parseInt(skipX.value, 10);
    updateSkipPosition();
  }

  skipY.oninput = () => {
    skipPos.y = parseInt(skipY.value, 10);
    updateSkipPosition();
  }

  // Ažuriranje pozicije videa unutar kruga
  function updateSkipPosition() {
    player.style.transform = `translate(-50%, -50%) translate(${skipPos.x}px, ${skipPos.y}px)`;
  }

  // Detect single click and double click
  overlay.addEventListener("click", (e) => {
    const now = Date.now();
    const timeDifference = now - lastTap;

    if (timeDifference < 300) {
      // Detektovan je dupli klik
      if (zoomed) {
        setZoom(videoNormalScale); // Vraća zoom na početnu poziciju
        zoomed = false;
      } else {
        // Prebacuje u skip button poziciju
        player.style.transform = `translate(-50%, -50%) translate(${skipPos.x}px, ${skipPos.y}px)`;
        zoomed = true;
      }

      // Sakrivanje overlay-a odmah nakon duplog klika
      overlay.style.display = "none";

      // Ponovno pokazivanje overlay-a nakon 1 sekunde
      setTimeout(() => {
        overlay.style.display = "block";
      }, 1000);

    } else {
      // Jedan klik (single tap) - ako nije dupli klik, čekaj 1 sekundu i ponovo prikaži overlay
      clearTimeout(singleTapTimeout);
      singleTapTimeout = setTimeout(() => {
        overlay.style.display = "block";
      }, 1000);

      // Sakrivanje overlay-a odmah nakon klika
      overlay.style.display = "none";
    }

    // Spremi vreme za detekciju sledećeg klika
    lastTap = now;
  });

</script>

</body>
</html>
