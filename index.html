<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Smart HTML Loader</title>
</head>
<body>

<script>
// =====================================================
//  1) PROBAJ DA UČITAŠ POSLEDNJI FAJL AUTOMATSKI
// =====================================================
(async function(){

    const saved = localStorage.getItem("htmlHandle");

    if (saved) {
        try {
            const handle = await deserializeHandle(saved);

            const perm = await handle.queryPermission({mode:"read"});
            if (perm === "granted") {
                const file = await handle.getFile();
                const text = await file.text();
                runHTML(text);
                return;
            }
        } catch(e) {
            console.warn("Auto load failed:", e);
        }
    }

    // Ako nismo uspeli → prikaži dugme za izbor fajla
    showPicker();

})();


// =====================================================
//  2) POKREĆE TVOJ HTML
// =====================================================
function runHTML(html){
    document.open();
    document.write(html);
    document.close();
}


// =====================================================
//  3) DUGME ZA BIRANJE LOKALNOG HTML FAJLA
// =====================================================
function showPicker(){
    document.body.innerHTML = `
        <h2>Izaberi HTML fajl</h2>
        <button id="pickBtn">Izaberi fajl</button>
    `;

    document.getElementById("pickBtn").onclick = async () => {
        const [handle] = await window.showOpenFilePicker({
            types: [{ description: "HTML Files", accept: {"text/html": [".html"]} }]
        });

        localStorage.setItem("htmlHandle", await serializeHandle(handle));

        const file = await handle.getFile();
        const text = await file.text();
        runHTML(text);
    };
}


// =====================================================
//  4) SERIJALIZACIJA FILE HANDLE-A
// =====================================================
// Chrome čuva handle u OPFs-u (origin private file system)
async function serializeHandle(handle){
    const root = await navigator.storage.getDirectory();
    await root.putFileHandle("saved.html", handle);
    return "saved.html";
}

async function deserializeHandle(key){
    const root = await navigator.storage.getDirectory();
    return await root.getFileHandle(key);
}
</script>

</body>
</html>
