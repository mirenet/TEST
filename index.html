<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube WebView Click Test</title>
<style>
    #video-container {
        position: relative;
        width: 560px;
        height: 315px;
    }
    #youtube-player {
        width: 100%;
        height: 100%;
        z-index: 1;
    }
    #play-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: rgba(0,0,0,0); /* potpuno transparentno */
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="video-container">
    <!-- YouTube iframe -->
    <iframe id="youtube-player"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1&autoplay=0"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>

    <!-- Transparentno dugme -->
    <div id="play-overlay"></div>
</div>

<script>
// Učitaj YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('youtube-player', {
        events: {
            'onReady': function() {
                const overlay = document.getElementById('play-overlay');
                overlay.addEventListener('click', (e) => {
                    player.playVideo();  // autoplay kao rezultat user gesture
                    overlay.style.display = 'none'; // ukloni overlay nakon prvog klika
                });
            }
        }
    });
}
</script>

</body>
</html>
