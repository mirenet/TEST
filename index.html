<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Skip Button Overlay Test</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}
h3{margin-top:20px;}

.circle{
  width:300px;
  height:300px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  margin-top:50px;
  background:#000;
  box-shadow:0 0 25px rgba(0,0,0,.6);
  touch-action: manipulation;
}

/* video */
.circle iframe{
  width:640px;
  height:360px;
  border:0;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.15);
  transform-origin:center;
  transition: transform 0.3s ease;
}

/* overlay */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:100;
  background:transparent;
  touch-action: none;
}

/* skip marker */
#skipMarker{
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  position:absolute;
  display:none;
  z-index:200;
  touch-action: none;
}

/* controls */
.controls{
  margin-top:30px;
  width:90%;
  max-width:400px;
  text-align:center;
}
.controls input[type="range"]{
  width:100%;
}
.controls input[type="number"]{
  width:80px;
  margin-top:10px;
  font-size:16px;
}

/* playlist */
.playlist{
  margin-top:30px;
  width:95%;
  max-width:500px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.video-btn{
  padding:8px;
  background:#222;
  border:1px solid #444;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}
.video-btn:active{
  background:#333;
}

/* long press menu */
#menu{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:#222;
  border:1px solid #555;
  padding:10px;
  display:none;
  flex-direction:column;
  gap:8px;
  z-index:300;
}
.menu-btn{
  background:#333;
  padding:8px;
  cursor:pointer;
  text-align:center;
}
.menu-btn:active{
  background:#444;
}
</style>
</head>
<body>

<h3>YouTube Skip Button Overlay Test</h3>

<div class="circle" id="circle">
  <iframe id="player" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allowfullscreen></iframe>
  <div id="overlay"></div>
  <div id="skipMarker"></div>
</div>

<div class="controls">
<p>Video Zoom</p>
<input type="range" id="zoomSlider" min="0.3" max="1.5" step="0.05" value="1.15">
<br><br>
<input type="number" id="zoomInput" step="0.05" value="1.15">
</div>

<div class="playlist" id="playlist"></div>

<script>
// ---- lista videa ----
const videos = [
  "dQw4w9WgXcQ", "9bZkp7q19f0", "3JZ_D3ELwOQ", "kJQP7kiw5Fk",
  "RgKAFK5djSk", "OPf0YbXqDm0", "JGwWNGJdvx8", "60ItHLz5WEA",
  "CevxZvSJLk8", "fRh_vgS2dFE", "lp-EO5I60KA", "KQ6zr6kCPj8",
  "pRpeEdMmmQ0", "hT_nvWreIhg", "YQHsXMglC9A"
];
const player = document.getElementById("player");
const playlist = document.getElementById("playlist");
const slider = document.getElementById("zoomSlider");
const input = document.getElementById("zoomInput");
const overlay = document.getElementById("overlay");
const circle = document.getElementById("circle");
const skipMarker = document.getElementById("skipMarker");

let skipPos = {x:150, y:150}; // default center
let videoNormalScale = 1.15;
let skipScale = 0.4;
let editMode = null; // controls current mode (zoom or skip)

let lastTap = 0;
let zoomed = false;
let lastTouch = {x: 0, y: 0};  // for pinch zoom and dragging

// ---- Playlist ----
videos.forEach(id => {
  const btn = document.createElement("div");
  btn.className = "video-btn";
  btn.innerText = id;
  btn.onclick = () => { player.src = "https://www.youtube.com/embed/" + id + "?enablejsapi=1"; };
  playlist.appendChild(btn);
});

// ---- Video Zoom ----
function setZoom(v) {
  videoNormalScale = parseFloat(v);
  player.style.transform = `translate(-50%,-50%) scale(${videoNormalScale})`;
  slider.value = v;
  input.value = v;
}

slider.oninput = () => { setZoom(slider.value); };
input.oninput = () => { setZoom(input.value); };

// ---- Event listener for one tap, long press, double tap ----
overlay.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    // Start of drag (skip button mode)
    lastTouch.x = e.touches[0].clientX;
    lastTouch.y = e.touches[0].clientY;
  }
}, false);

// To detect pinch zoom
overlay.addEventListener("touchmove", e => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
    const scale = Math.min(2, Math.max(0.5, dist / 100));  // scaling limit
    player.style.transform = `translate(-50%,-50%) scale(${scale})`;
    zoomed = true;
  } else if (e.touches.length === 1) {
    // Drag for skip button
    const deltaX = e.touches[0].clientX - lastTouch.x;
    const deltaY = e.touches[0].clientY - lastTouch.y;

    if (editMode === 'skip') {
      skipPos.x += deltaX;
      skipPos.y += deltaY;
      skipMarker.style.left = skipPos.x + "px";
      skipMarker.style.top = skipPos.y + "px";
    }

    lastTouch.x = e.touches[0].clientX;
    lastTouch.y = e.touches[0].clientY;
  }
}, false);

// Single tap
overlay.addEventListener("touchend", e => {
  if (e.touches.length === 0) {
    // Single tap: Passes click through
    const now = Date.now();
    if (now - lastTap < 300) {
      // Double tap detected
      if (editMode === 'skip') {
        // Toggle between skip and video zoom modes
        player.style.transform = `translate(-50%,-50%) scale(${videoNormalScale})`;
        editMode = 'zoom';
      } else {
        // Switch to skip mode
        editMode = 'skip';
        skipMarker.style.display = 'block';
      }
    }
    lastTap = now;
  }
}, false);

</script>
</body>
</html>
