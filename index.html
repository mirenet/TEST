<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Smart HTML Loader</title>
</head>
<body>

<script>
// ==========================================
//  POKUŠAJ AUTOMATSKOG OTVARANJA POSLEDNJEG FAJLA
// ==========================================
(async function(){

    // Ako postoji sačuvan handle → pokušaj da ga otvoriš
    const saved = localStorage.getItem("lastHTMLhandle");

    if (saved) {
        try {
            const handle = await window.showFileSystemPicker
                ? await deserializeHandle(saved)
                : null;

            if (handle) {
                const perm = await handle.queryPermission({mode:"read"});

                if (perm === "granted") {
                    const file = await handle.getFile();
                    const text = await file.text();
                    runHTML(text);
                    return;
                }
            }
        } catch(e){
            console.log("Auto load failed:", e);
        }
    }

    // Ako nismo uspeli → prikaži uploader
    showUploader();

})();


// ==========================================
//  FUNKCIJA: POKREĆE TVOJ HTML
// ==========================================
function runHTML(html){
    document.open();
    document.write(html);
    document.close();
}


// ==========================================
//  FUNKCIJA: PRIKAŽI UPLOADER ZA BIRANJE FAJLA
// ==========================================
function showUploader(){
    document.body.innerHTML = `
        <h2>Izaberi svoj lokalni HTML fajl</h2>
        <input type="file" id="fileInput" accept=".html">
    `;

    document.getElementById("fileInput").addEventListener("change", async (ev) => {
        const file = ev.target.files[0];
        if (!file) return;

        // Sačuvaj file handle ako browser podržava
        if (ev.target.files[0].handle) {
            const handle = ev.target.files[0].handle;
            const serialized = await serializeHandle(handle);
            localStorage.setItem("lastHTMLhandle", serialized);
        }

        const text = await file.text();
        runHTML(text);
    });
}


// ==========================================
//  SERIJALIZACIJA FILE HANDLE-a (Chrome only)
// ==========================================
async function serializeHandle(handle){
    return await window.navigator.storage.getDirectory().then(async dir => {
        try {
            const key = 'savedHandle';
            await dir.values().next();
            await dir.setItem(key, handle);
            return key;
        } catch(e){
            console.error("Serialize error:", e);
            return null;
        }
    });
}

async function deserializeHandle(key){
    return await window.navigator.storage.getDirectory().then(async dir => {
        try {
            return await dir.getItem(key);
        } catch(e){
            console.error("Deserialize error:", e);
            return null;
        }
    });
}
</script>

</body>
</html>
